# Branding/theme configuration example for docs-portal.
#
# Copy this file to your project root as "docs-portal.toml" and customize it.
# Every setting is optional; omitted values use the built-in defaults.
#
#   cp examples/docs-portal.example.toml docs-portal.toml
#   docs-portal
#
# You can also pass a different config file with: --config path/to/file.toml

[branding]
# Name shown in the portal title, text logo and header.
name = "Acme Documentation"

# Short subtitle shown in the portal hero.
tagline = "Operational knowledge base"

# Descriptive paragraph shown in the portal hero.
description = "Guides, procedures and technical documents collected in one navigable index."

# <title> suffix for generated document pages. If omitted, it follows "name".
# doc_title_suffix = "Acme Docs"

# Company logo: path relative to this config file. It is embedded as base64 so
# pages stay self-contained and work offline.
logo = "assets/logo.png"

# Favicon: an emoji rendered as SVG, or a path to an image.
favicon = "🏭"

# Portal footer text. Omit it to hide the footer.
footer = "© 2026 Acme Inc."

[colors]
# Overrides for theme CSS custom properties. The "--" prefix is implicit.
# Useful names: blue (primary accent), bg (page background), dark
# (sidebar/header), ink (text), muted (secondary text), line (borders), green,
# orange, red.
blue = "#b3122c"
dark = "#1a1a1a"
bg   = "#f7f5f2"
